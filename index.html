<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>For you 💛</title>
  <meta name="description" content="A little map made just for you." />

  <meta name="theme-color" content="#fbf7f4" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#141019" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="The Map" />

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/icons/icon.svg" />

  <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <a class="skip-link" href="#sheet">Skip to the clue</a>

  <div id="map"></div>

  <header id="topbar">
    <div id="progress" class="progress" role="img" aria-label="Journey progress"></div>
  </header>

  <main id="sheet" class="sheet" aria-live="polite"></main>

  <div id="overlay" class="overlay" tabindex="0" hidden></div>
  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <script src="vendor/leaflet/leaflet.js"></script>
  <script src="js/journey.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
